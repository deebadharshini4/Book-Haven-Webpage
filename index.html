<!DOCTYPE html>
<html>
<head>
    <title>Book Haven</title>
    <style>
        body{
            background: linear-gradient(to left,#5D4037,#3E2723,#2E1A13,#3E2723,#5D4037);
            font-family: Arial, sans-serif;
        }
        h1{
            color: wheat;
            text-align: center;
            font-size: 100px;
        }
        h2{
            color: white;
            text-align: center;
            font-size: 45px;
        }
        h3{
            color: beige;
            text-align: center;
            font-style: italic;
            margin-top: -40px;
        }
        h6{
            color: white;
            text-align: center;
            font-size: 25px;
        }
        .Mainimage{
            width: 40%;
            height: 500px;
            display: block;
            margin: auto;
            border-radius: 30px;
            border: 3px solid wheat;
            transition: 0.8s;
        }
        .Mainimage:hover{
            transform: translateY(-20px);
        }
        .Main{
            display: flex;
            justify-content: space-evenly;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 40px;
        }
        .Small{
            width: 320px;
            background-color: beige;
            border-radius: 20px;
            text-align: center;
            transition: 0.5s;
        }
        .Small:hover{
            transform: translateY(-15px);
        }
        .Small img{
            width: 320px;
            height: 220px;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            object-fit: cover;
        }
        .Small p{
            font-size: 20px;
            font-weight: bold;
        }
        .Small button{
            width: 250px;
            height: 45px;
            margin-bottom: 15px;
            border: none;
            border-radius: 10px;
            background-color: #6D4C41;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        .Small button:hover{
            background-color: #4E342E;
        }
    </style>
</head>

<body>

    <h1>BOOK HAVEN</h1>

    <h3>"A reader lives a thousand lives before he dies."</h3>

    <img src="https://images.unsplash.com/photo-1507842217343-583bb7270b66?w=1200"
         alt="Library"
         class="Mainimage">

    <h2>Popular Books</h2>

    <div class="Main">

        <div class="Small">
            <img src="https://images.unsplash.com/photo-1544947950-fa07a98d237f?w=800" alt="">
            <p>Harry Potter</p>
            <button>Read More</button>
        </div>

        <div class="Small">
            <img src="https://images.unsplash.com/photo-1512820790803-83ca734da794?w=800" alt="">
            <p>The Hobbit</p>
            <button>Read More</button>
        </div>

        <div class="Small">
            <img src="https://images.unsplash.com/photo-1524578271613-d550eacf6090?w=800" alt="">
            <p>Pride and Prejudice</p>
            <button>Read More</button>
        </div>

        <div class="Small">
            <img src="https://images.unsplash.com/photo-1516979187457-637abb4f9353?w=800" alt="">
            <p>The Alchemist</p>
            <button>Read More</button>
        </div>

    </div>

    <h2>Monthly Picks</h2>

    <div class="Main">

        <div class="Small">
            <img src="https://images.unsplash.com/photo-1519682337058-a94d519337bc?w=800" alt="">
            <p>Mystery Pick</p>
            <button>Join Discussion</button>
        </div>

        <div class="Small">
            <img src="https://images.unsplash.com/photo-1495446815901-a7297e633e8d?w=800" alt="">
            <p>Fantasy Pick</p>
            <button>Join Discussion</button>
        </div>

        <div class="Small">
            <img src="https://images.unsplash.com/photo-1511108690759-009324a90311?w=800" alt="">
            <p>Romance Pick</p>
            <button>Join Discussion</button>
        </div>

        <div class="Small">
            <img src="https://images.unsplash.com/photo-1521587760476-6c12a4b040da?w=800" alt="">
            <p>Sci-Fi Pick</p>
            <button>Join Discussion</button>
        </div>

    </div>

    <h6>bookhaven@readersclub.com</h6>

</body>
</html>
